{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold text-base-content mb-4">Promociones</h1>
        <div class="divider divider-primary w-1/2 mx-auto"></div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {% for promo in promos %}
        <div class="group overflow-hidden rounded-lg shadow-md hover:shadow-lg transition-shadow duration-300">
            <figure class="aspect-w-16 aspect-h-9">
                {% if promo.image_url.name %}
                    <img src="{{ promo.image_url.url }}" 
                        alt="{{ promo.title }}"
                        class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                {% else %}
                    <img src="" 
                    alt="{{ promo.title }}"
                    class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                {% endif %}
            </figure>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock content %}
