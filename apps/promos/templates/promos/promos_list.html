{% extends "base.html" %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-center mb-8 text-primary">Promociones Especiales</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for promo in promos %}
        <div class="card bg-base-100 shadow-lg hover:shadow-xl transition-shadow duration-300">
            <figure class="relative h-48 overflow-hidden">
                <img src="{{ promo.image_url }}" alt="{{ promo.title }}" 
                     class="w-full h-full object-cover transition-transform duration-500 hover:scale-105">
                <div class="absolute top-4 right-4 badge badge-accent badge-lg font-bold p-4">
                    PROMO
                </div>
            </figure>
            <div class="card-body">
                <h2 class="card-title text-xl font-bold">{{ promo.title }}</h2>
                {% if promo.description %}
                <p class="text-base-content/80">{{ promo.description }}</p>
                {% endif %}
                <div class="card-actions justify-end mt-4">
                    <button class="btn btn-primary">Ver Detalles</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock content %}
