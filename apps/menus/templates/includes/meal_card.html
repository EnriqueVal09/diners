<div class="card lg:card-side bg-base-100 shadow-md hover:shadow-lg transition-shadow duration-300">
    <figure class="lg:w-1/3">
        <img src="{{ meal.image_url }}" alt="{{ meal.name }}" class="w-full h-48 lg:h-full object-cover" />
    </figure>
    <div class="card-body lg:w-2/3">
        <div class="flex justify-between items-start">
            <h2 class="card-title text-lg font-bold">{{ meal.name }}</h2>
            <span class="badge badge-primary text-white p-3 text-lg font-bold">${{ meal.price }}</span>
        </div>
        <p class="text-gray-600 mb-4">{{ meal.description }}</p>
        
        <!-- Sección para precios adicionales -->
        {% if meal.options.all.count %}
        <div class="mt-2 pt-2 border-t border-gray-100">
            <p class="text-sm text-gray-500 italic">Adicionales:</p>
            <ul class="text-xs text-gray-600 space-y-1 mt-1">
                {% for option in meal.options.all %}
                <li class="flex justify-between">
                    <span>{{ option.name }}</span>
                    <span class="font-medium">+${{ option.extra_price }}</span>
                </li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</div>
