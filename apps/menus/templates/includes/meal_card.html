<div class="card bg-base-100 lg:card-side shadow-md hover:shadow-lg transition-shadow duration-300">
    {% if meal.image_url.name %}
        <figure class="lg:w-1/3">
            <img src="{{ meal.image_url.url }}" alt="{{ meal.name }}" class="w-full h-48 lg:h-full object-cover" />
        </figure>
    {% endif %}
    <div class="card-body lg:w-2/3">
        <div class="flex justify-between items-start">
            <h2 class="card-title text-lg font-bold">{{ meal.name }}</h2>
            <span class="badge badge-primary p-3 text-lg font-bold">${{ meal.price }}</span>
        </div>
        <p class="mb-4 text-base-content/80">{{ meal.description }}</p>
        
        <!-- Sección para precios adicionales -->
        {% if meal.options.all.count %}
        <div class="mt-2 pt-2 border-t border-base-200">
            <p class="text-sm italic text-base-content/60">Adicionales:</p>
            <ul class="text-sm space-y-1 mt-1 text-base-content/70">
                {% for option in meal.options.all %}
                <li class="flex justify-between">
                    <span>{{ option.name }}</span>
                    <span class="font-medium">+${{ option.extra_price }}</span>
                </li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</div>
